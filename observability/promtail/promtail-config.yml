# Promtail config for OrgChat observability stack.
# Design doc: docs/superpowers/specs/2026-04-21-orgchat-observability-design.md

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push
    tenant_id: orgchat

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: container
        replacement: "$1"
      - source_labels: [container]
        regex: "^(orgchat-|kairos-).*"
        action: keep
      - source_labels: [container]
        regex: "^frams-.*"
        action: drop
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      - target_label: job
        replacement: orgchat-containers
    pipeline_stages:
      - docker: {}
