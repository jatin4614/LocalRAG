groups:
  - name: rag-quality
    interval: 30s
    rules:
      # Wave 2 (review §8.3): alerts when retrievals routinely come back empty.
      # 0.1 events/sec averaged over 5m ≈ 30 empty retrievals every 5 minutes,
      # which is well above the noise floor for a healthy KB (most queries hit
      # at least one chunk after RBAC + intent routing). The 10-minute `for:`
      # window keeps quick traffic spikes from paging during a single bad batch.
      - alert: RagRetrievalEmptyHigh
        expr: rate(rag_retrieval_empty_total[5m]) > 0.1
        for: 10m
        labels:
          severity: warning
          component: rag
        annotations:
          summary: "RAG returning zero hits — intent={{ $labels.intent }}, kbs={{ $labels.kb_count }}"
          description: |
            Sustained empty retrievals from chat_rag_bridge for >10 min.
            Likely causes: (1) corpus drift — selected KBs no longer cover
            the queries; (2) embedding model swap without re-embed; (3)
            ingest pipeline broken (`kb_documents.ingest_status` stuck);
            (4) intent classifier routing to wrong KB set. Check the
            `rag_retrieval_empty_total` time-series + recent kb_admin
            health endpoint output.

      # Wave 2 (review §8.4): baseline-relative trigger on the
      # rag_silent_failure_total ramp. The metric exists in metrics.py:502
      # and is incremented by _record_silent_failure() on every fail-open
      # path in chat_rag_bridge (catalog_render, hits_emit, metric_emit,
      # rerank_fallback, etc.). A small steady rate is normal — what we
      # want to catch is a 3x ramp vs the same time *yesterday*, which
      # smooths out daily traffic curves and only fires on real regressions.
      # We compare a tight 15-minute current rate against a wider 6-hour
      # rate offset 1d (= 1 day ago) so the baseline isn't whip-sawed by
      # short-lived noise. 30-minute `for:` to dampen single bad batches.
      # Wave 2 (review §8.7): daily nDCG cron staleness alert is BLOCKED.
      #
      # The cron at scripts/daily_eval_cron.sh writes to
      #   /var/lib/node_exporter/textfile_collector/retrieval_daily.prom
      # but the orgchat-obs-node-exporter container is NOT started with
      #   --collector.textfile.directory=...
      # so node_textfile_mtime_seconds is never emitted and the staleness
      # query (`time() - node_textfile_mtime_seconds{file=~".*daily_eval.*"} > 26*3600`)
      # would be vacuous (no series → no alert ever fires).
      #
      # TODO: enable the textfile collector on node-exporter
      #   1. Bind-mount /var/lib/node_exporter/textfile_collector into
      #      orgchat-obs-node-exporter (e.g. as a volume in
      #      observability/docker-compose.yml).
      #   2. Add `--collector.textfile.directory=/var/lib/node_exporter/textfile_collector`
      #      to that service's command list.
      #   3. THEN add the alert rule below — keep the labeled trigger
      #      identical so dashboards stay stable across cutover:
      #
      # - alert: DailyEvalStale
      #   expr: time() - node_textfile_mtime_seconds{file=~".*daily_eval.*"} > 26 * 3600
      #   for: 1h
      #   labels: {severity: warning, component: rag}
      #   annotations:
      #     summary: "daily_eval_cron has not written results in >26h"
      #     description: |
      #       The daily nDCG cron writes a textfile that node-exporter
      #       picks up. >26h staleness means the cron is broken or the
      #       collector isn't reading the directory.

      - alert: RagSilentFailureRamp
        expr: |
          rate(rag_silent_failure_total[15m])
            > 3 * rate(rag_silent_failure_total[6h] offset 1d)
        for: 30m
        labels:
          severity: warning
          component: rag
        annotations:
          summary: "rag_silent_failure_total >3x yesterday's baseline (stage={{ $labels.stage }})"
          description: |
            The 15-minute rate of silent (logged-only) failures on
            stage `{{ $labels.stage }}` is more than 3x the 6-hour
            rolling rate from the same time yesterday. Investigate by
            grepping open-webui logs for "rag-silent-failure" tagged
            with the matching stage label — the original exception is
            attached. Most-likely culprits historically: TEI/reranker
            briefly down, Postgres latency spike during catalog_render,
            or a recent change to kb_documents schema breaking the
            metadata path.
