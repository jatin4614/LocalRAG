groups:
  - name: celery_soak
    interval: 30s
    rules:
      - alert: CeleryDLQDepthHigh
        expr: celery_dlq_depth > 10
        for: 10m
        labels: {severity: warning}
        annotations:
          summary: "Celery DLQ depth {{ $value }} > 10"
          description: "Workers are unable to process some tasks. Inspect logs."

      - alert: CeleryWorkerDown
        expr: up{job="celery-worker"} == 0
        for: 5m
        labels: {severity: critical}
        annotations:
          summary: "celery-worker container down"
          description: "Async ingest will fail open with sync (if RAG_SYNC_INGEST=1) or hang (if RAG_SYNC_INGEST=0)."

      - alert: CeleryUploadLatencyHigh
        expr: histogram_quantile(0.95, rate(celery_upload_latency_seconds_bucket[5m])) > 30
        for: 10m
        labels: {severity: warning}
        annotations:
          summary: "Celery upload p95 latency > 30s"
          description: "Worker may be saturated or slow."

      # 2026-05-03 — silent stuck-at-chunking detection. The ingest worker
      # writes kb_documents.ingest_status via _update_doc_status; if that
      # write fails (asyncpg loop binding, PG transient down, schema drift),
      # the actual chunk+upsert work still completes in Qdrant but the DB
      # row stays at the previous status forever. Operator sees "stuck at
      # chunking" in the admin UI even though retrieval works. Counter is
      # bumped from ext/workers/ingest_worker.py:_update_doc_status's
      # exception path (commit ebe4fee).
      - alert: IngestStatusUpdateFailing
        expr: rate(ingest_status_update_failed_total[5m]) > 0
        for: 5m
        labels: {severity: warning, component: ingest}
        annotations:
          summary: "celery-worker can't write kb_documents.ingest_status (stage={{ $labels.stage }})"
          description: |
            Ingest is silently completing but the kb_documents row is
            stuck at the prior status. Failing stage label is the target
            status the write was attempting (chunking/embedding/done).
            Check celery-worker logs for "ingest: failed to update
            kb_documents.ingest_status" — the original exception is
            attached. Most-likely culprits historically: asyncpg
            connection loop binding (commit ebe4fee NullPool fix), PG
            connection saturation, or a kb_documents schema migration
            that hasn't been applied.
