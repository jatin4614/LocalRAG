# OrgChat Observability Stack (LGTM + Jaeger)
# Separate compose project — runs in parallel with the existing FRAMS observability stack.
# Design doc: docs/superpowers/specs/2026-04-21-orgchat-observability-design.md
#
# Notes:
# - All UIs bind to 127.0.0.1 only (localhost-reachable, not exposed on LAN).
# - Services attach to both `orgchat-obs-net` (internal) and `orgchat-net` (external)
#   so Prometheus can resolve `orgchat-*` container DNS names.
# - DCGM: FRAMS already has `frams-nvidia-exporter` scraping the same GPU. Two DCGM
#   exporters on one GPU is safe (read-only NVML) but intentional — document at review.
# - Prometheus: `--web.enable-remote-write-receiver` is enabled so the OTel collector
#   can push OTLP metrics via prometheusremotewrite.

services:
  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: orgchat-obs-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-remote-write-receiver
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../volumes/observability/prometheus:/prometheus
    ports:
      - "127.0.0.1:9091:9090"
    mem_limit: 1g
    cpus: 1.0
    networks:
      - orgchat-obs-net
      - orgchat-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  loki:
    image: grafana/loki:2.9.3
    container_name: orgchat-obs-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - ../volumes/observability/loki:/loki
    ports:
      - "127.0.0.1:3101:3100"
    mem_limit: 1g
    networks:
      - orgchat-obs-net
      - orgchat-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  promtail:
    image: grafana/promtail:3.2.0
    container_name: orgchat-obs-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    environment:
      DOCKER_API_VERSION: "1.44"
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    mem_limit: 256m
    networks:
      - orgchat-obs-net
      - orgchat-net
    depends_on:
      - loki
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  jaeger:
    image: jaegertracing/all-in-one:1.54
    container_name: orgchat-obs-jaeger
    restart: unless-stopped
    environment:
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: "false"
      BADGER_DIRECTORY_VALUE: /badger/data
      BADGER_DIRECTORY_KEY: /badger/key
      BADGER_SPAN_STORE_TTL: 72h
      COLLECTOR_OTLP_ENABLED: "true"
    volumes:
      - ../volumes/observability/jaeger:/badger
    ports:
      # UI only — OTLP/gRPC (4317) and collector HTTP (14268, 14269) stay internal.
      - "127.0.0.1:16687:16686"
    mem_limit: 1g
    networks:
      - orgchat-obs-net
      - orgchat-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  otelcol:
    image: otel/opentelemetry-collector-contrib:0.109.0
    container_name: orgchat-obs-otelcol
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel/otel-collector.yml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "127.0.0.1:4319:4317"
      - "127.0.0.1:4320:4318"
    mem_limit: 256m
    networks:
      - orgchat-obs-net
      - orgchat-net
    depends_on:
      - jaeger
      - loki
      - prometheus
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  node-exporter:
    image: prom/node-exporter:v1.9.1
    container_name: orgchat-obs-node-exporter
    restart: unless-stopped
    pid: host
    command:
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /:/rootfs:ro,rslave
    ports:
      - "127.0.0.1:9101:9100"
    mem_limit: 128m
    networks:
      - orgchat-obs-net
      - orgchat-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  cadvisor:
    # Host port 8080 is taken by frams-cadvisor; we bind container 8080 to host 8081.
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    container_name: orgchat-obs-cadvisor
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    command:
      - --docker_only=true
      - --store_container_labels=false
      - --whitelisted_container_labels=com.docker.compose.project,com.docker.compose.service
    ports:
      - "127.0.0.1:8081:8080"
    mem_limit: 256m
    networks:
      - orgchat-obs-net
      - orgchat-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  dcgm-exporter:
    # WARNING: frams-nvidia-exporter already scrapes the GPU (NVML is read-only, so
    # parallel scraping is safe but intentional — keeping our own for orgchat labels).
    image: nvidia/dcgm-exporter:3.3.7-3.5.0-ubuntu22.04
    container_name: orgchat-obs-dcgm-exporter
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    ports:
      - "127.0.0.1:9401:9400"
    mem_limit: 256m
    networks:
      - orgchat-obs-net
      - orgchat-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: orgchat-obs-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=disable"
    ports:
      - "127.0.0.1:9187:9187"
    mem_limit: 128m
    networks:
      - orgchat-obs-net
      - orgchat-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis-exporter:
    image: oliver006/redis_exporter:v1.74.0
    container_name: orgchat-obs-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://orgchat-redis:6379"
    ports:
      - "127.0.0.1:9122:9121"
    mem_limit: 128m
    networks:
      - orgchat-obs-net
      - orgchat-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:12.0.2
    container_name: orgchat-obs-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ../volumes/observability/grafana:/var/lib/grafana
    ports:
      - "127.0.0.1:3002:3000"
    mem_limit: 512m
    networks:
      - orgchat-obs-net
      - orgchat-net
    depends_on:
      - prometheus
      - loki
      - jaeger
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  orgchat-obs-net:
    name: orgchat-obs-net
    driver: bridge
  orgchat-net:
    name: orgchat-net
    external: true
