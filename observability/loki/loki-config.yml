# Loki monolithic config for OrgChat observability stack.
# Design doc: docs/superpowers/specs/2026-04-21-orgchat-observability-design.md
#
# Storage: Badger index + filesystem chunks under /loki (bind-mounted volume).
# Retention: 168h (7d, see §8.12). Auth disabled because the service is bound to 127.0.0.1 only.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: boltdb-shipper
      object_store: filesystem
      schema: v12
      index:
        prefix: index_
        period: 24h

storage_config:
  boltdb_shipper:
    active_index_directory: /loki/index
    cache_location: /loki/index_cache
    shared_store: filesystem
  filesystem:
    directory: /loki/chunks

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  # Wave 2 (review §8.12): 72h → 168h to match Jaeger so Friday-incident
  # / Monday-triage workflows have logs alongside traces.
  retention_period: 168h
  max_query_series: 5000
  ingestion_rate_mb: 8
  ingestion_burst_size_mb: 16
  allow_structured_metadata: false

compactor:
  working_directory: /loki/compactor
  shared_store: filesystem
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150

ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-temp
  alertmanager_url: ""
  ring:
    kvstore:
      store: inmemory
  enable_api: true

analytics:
  reporting_enabled: false
