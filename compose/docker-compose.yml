version: "3.8"

name: orgchat

# Wave 2 (review §11.4): YAML anchor for consistent log rotation across the
# base stack. Without rotation, journald/json-file grow unbounded and fill
# /var/lib/docker on a multi-week run. 100MB × 3 = 300MB cap per container,
# safe for any host that can run this stack at all. Apply via
# `logging: *rotated-logging` in each service block. Per-service mem_limit
# / cpus are added only on the OOM-risk services (postgres, qdrant, vllm-*,
# open-webui, celery-worker) — the rest are bounded by their own designs.
x-rotated-logging: &rotated-logging
  driver: json-file
  options:
    max-size: "100m"
    max-file: "3"

networks:
  default:
    name: orgchat-net
    driver: bridge
    internal: false  # temporarily false; switched to true after Caddy is wired (Task 7)

volumes:
  postgres_data: { driver: local }
  redis_data:    { driver: local }
  qdrant_data:   { driver: local }
  # Shared between open-webui (producer) and celery-worker (consumer).
  # Default after Plan B Phase 6.2 is RAG_SYNC_INGEST=0 (async); set
  # RAG_SYNC_INGEST=1 to revert to the legacy in-process sync path
  # (in which case nothing writes to this volume).
  ingest_blobs:  { driver: local }
  # Persists the celery-beat schedule file (last-run timestamps) across
  # container restarts so the daily tier-storage cron does not re-fire after
  # every redeploy. Only used by the celery-beat service.
  celery_beat_state: { driver: local }
  # Wave 3a (review §4.2): backup output directory shared between the
  # celery-worker (in-container daily Qdrant snapshot task) and the
  # operator's host. Bind-mounted to ../backups on the host so the
  # Celery task writes snapshots that `scripts/restore_drill.sh` and
  # the host-side `backup_qdrant.sh` can read. Compose creates the host
  # path on demand at `up -d` time.
  backups: { driver: local }

# Wave 1b (review §11.5): docker secrets. Backed by host files under
# compose/secrets/ (NEVER committed — see compose/secrets/.gitignore).
# Each secret is mounted at /run/secrets/<name> inside the consuming
# container; services that natively support the `_FILE` convention
# (postgres, qdrant) read the path directly. open-webui's
# WEBUI_SECRET_KEY does NOT have a `_FILE` convention upstream, so it
# still falls back to the env-var path; mounting the secret here makes
# it available to a future entrypoint wrapper or to operator-side
# `docker exec` for rotation.
#
# Files are OPTIONAL: if compose/secrets/<name> doesn't exist on the
# host, `docker compose up` fails fast with "secret <name>: file
# /path/to/secret not found". Operators who haven't migrated yet
# can comment out this block + the per-service `secrets:` lists OR
# just create the files with the same values they already have in
# .env. See compose/secrets/README.md for the migration recipe and
# how scripts/bootstrap.sh degrades gracefully when the dir is absent.
secrets:
  postgres_password:
    file: ./secrets/postgres_password
  webui_secret_key:
    file: ./secrets/webui_secret_key
  rag_admin_token:
    file: ./secrets/rag_admin_token
  qdrant_api_key:
    file: ./secrets/qdrant_api_key

services:
  postgres:
    image: postgres:15-alpine
    container_name: orgchat-postgres
    restart: unless-stopped
    logging: *rotated-logging
    mem_limit: 4g
    cpus: 2
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      # Wave 1b (review §11.5): file-backed secret keeps the cleartext
      # password out of `docker inspect`. Postgres rejects when BOTH
      # POSTGRES_PASSWORD and POSTGRES_PASSWORD_FILE are set, so the
      # env-var form is intentionally NOT included here. Bootstrap
      # populates compose/secrets/postgres_password from the .env value
      # (scripts/bootstrap.sh, idempotent). To opt out of file-based
      # secrets, swap the next line for `POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}`
      # and drop the `secrets:` block below.
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB:       ${POSTGRES_DB}
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../ext/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: orgchat-redis
    restart: unless-stopped
    logging: *rotated-logging
    mem_limit: 1g
    cpus: 1
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: orgchat-qdrant
    restart: unless-stopped
    logging: *rotated-logging
    mem_limit: 8g
    cpus: 4
    # Plan B Phase 5 — cluster (distributed) mode is required for custom
    # sharding (kb_1_v4 onward). One-time enablement on 2026-04-26 required
    # snapshotting all collections, wiping qdrant_data, restoring after
    # restart (Qdrant cannot promote standalone storage to cluster format
    # in-place). See docs/runbook/temporal-reshard-procedure.md.
    environment:
      QDRANT__CLUSTER__ENABLED: "true"
      # Wave 1a (review §4.1): per-request API-key gate on REST + gRPC.
      # If QDRANT_API_KEY is unset/empty in compose/.env, qdrant runs with
      # no auth (current default). If set, every client must include the
      # `api-key: …` header — VectorStore reads QDRANT_API_KEY from env
      # and passes it to AsyncQdrantClient. Operator scripts that talk
      # to Qdrant directly (reembed_all, reconcile_qdrant_schema, etc.)
      # also need QDRANT_API_KEY in their env to keep working — see
      # docs/superpowers/plans/2026-05-02-bug-fix-campaign.md (Wave 2 G).
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-}
    # Wave 1b (review §11.5): mount the api-key secret at /run/secrets/
    # qdrant_api_key. Qdrant's settings system doesn't have a native
    # `_FILE` convention so QDRANT__SERVICE__API_KEY still consumes the
    # env var above; the mounted secret is available for an entrypoint
    # wrapper or for operator-side `docker exec orgchat-qdrant cat /run/
    # secrets/qdrant_api_key` during rotation.
    secrets:
      - qdrant_api_key
    # First (and only) peer in a single-node cluster must advertise its
    # P2P URI so consensus can initialize. Inside the orgchat compose
    # network, the service is reachable as http://qdrant:6335.
    command:
      - "./entrypoint.sh"
      - "--uri"
      - "http://qdrant:6335"
    ports:
      # Wave 1a (review §11.2): bound to loopback so the LAN can't reach
      # Qdrant directly. Caddy + open-webui are on the docker network and
      # still talk to qdrant:6333 via service name. Operators who need
      # ad-hoc REST access run `curl http://127.0.0.1:6333/...` from the
      # host (or via SSH port-forward); LAN clients are denied at the
      # network layer regardless of API-key state.
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    container_name: orgchat-caddy
    restart: unless-stopped
    logging: *rotated-logging
    mem_limit: 256m
    cpus: 1
    ports:
      - "8880:80"
      - "8443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ../volumes/certs:/certs:ro
    depends_on:
      - open-webui

  # To swap chat model: set CHAT_MODEL in compose/.env to any HF repo id.
  # vllm will download on first boot (requires HF_HUB_OFFLINE=0 for the first
  # run — see docs/rag-model-swap.md). After the cache is populated,
  # HF_HUB_OFFLINE=1 is safe.
  #
  # Suggested swap targets (as of 2026-04):
  #   Qwen/Qwen2.5-14B-Instruct-AWQ         ~8 GB VRAM (current default)
  #   google/gemma-3-27b-it                 ~54 GB VRAM — won't fit on 32 GB
  #   google/gemma-3-12b-it                 ~24 GB VRAM — tight fit
  #   solidrust/gemma-3-27b-it-AWQ          ~14 GB VRAM (4-bit quant)
  #   meta-llama/Llama-3.3-70B-Instruct-AWQ ~18 GB VRAM (4-bit quant)
  #
  # Don't forget to set RAG_BUDGET_TOKENIZER to match (gemma-3 / qwen / llama).
  vllm-chat:
    # nightly: vllm 0.19.2rc1 + transformers 5.5.4 (required for Gemma 4
    # 'gemma4' model_type — stable 0.19 latest has transformers 4.57 which
    # doesn't recognize the architecture). Pulled 2026-04-20.
    image: vllm/vllm-openai:nightly
    container_name: orgchat-vllm-chat
    restart: unless-stopped
    logging: *rotated-logging
    mem_limit: 32g
    cpus: 8
    ipc: host
    # No host port — accessed via Docker network only (open-webui → vllm-chat:8000)
    volumes:
      - ../volumes/models:/root/.cache/huggingface/hub
      # Pin in vLLM PR #40347 (still open as of 2026-04-27) to fix Gemma 4
      # vision_tower fp16 overflow that produced "<pad>" output for every
      # image. The patch keeps vision_tower in bf16 even when the LM is fp16.
      # Drop this mount once the PR ships in a tagged vLLM release we use.
      - ../patches/vllm/gemma4_mm.py:/usr/local/lib/python3.12/dist-packages/vllm/model_executor/models/gemma4_mm.py:ro
    environment:
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    command:
      - "--model"
      - "${CHAT_MODEL}"
      - "--served-model-name"
      - "orgchat-chat"
      - "--max-model-len"
      - "32768"
      # GPU 0 (RTX 6000 Ada 48 GB). TEI (Phase 1) and open-webui reranker
      # (Phase 3) are on GPU 1 (Blackwell). Remaining GPU 0 tenant: ~7.3 GB
      # of frams-recognition-worker-* (separate project).
      # 0.70 × 48 = 33.6 GB for vllm: weights (~20 GB) + FP8 KV cache (~13 GB)
      # → ~28k token budget. Leaves ~5 GB headroom on GPU 0 beyond frams +
      # vllm + overhead — safer margin against transient spikes.
      - "--gpu-memory-utilization"
      - "0.70"
      # Cap concurrent sequences at 32 (8 users × burst of 4 outstanding).
      # Prevents KV fragmentation and keeps prefix-cache hit rate high.
      - "--max-num-seqs"
      - "32"
      - "--enable-prefix-caching"
      - "--enable-chunked-prefill"
      - "--kv-cache-dtype"
      - "fp8"
      # Gemma 4 has a built-in thinking/reasoning mode. Without these parsers,
      # vLLM emits raw reasoning tokens as content="" (finish_reason=length).
      # Per QuantTrio/gemma-4-31B-it-AWQ README.
      - "--reasoning-parser"
      - "gemma4"
      - "--tool-call-parser"
      - "gemma4"
      - "--enable-auto-tool-choice"
      # Multimodal flags — required by Gemma 4 vision per the QuantTrio
      # README and the official vLLM Gemma 4 recipe. Without these, image
      # requests succeed (HTTP 200) but the model returns only "<pad>" tokens
      # because the SigLIP image embeddings are not being inserted into the
      # prompt: --trust-remote-code lets vLLM load the model's custom
      # Gemma4Processor; --limit-mm-per-prompt actually allocates the
      # multimodal pathway (default 0 in this vLLM build); --mm-processor-kwargs
      # pins the per-image soft-token budget to the value baked into the
      # model's processor_config.json (image_seq_length=280).
      - "--trust-remote-code"
      - "--limit-mm-per-prompt"
      - '{"image": 4, "audio": 0}'
      - "--mm-processor-kwargs"
      - '{"max_soft_tokens": 280}'
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/v1/models || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 15
      # Gemma 4 31B AWQ first load: ~60-120 s mmap from volumes/models.
      start_period: 300s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]

  tei:
    # Blackwell-specific build (sm_120) — the generic :1.9 tag is Ampere 8.0
    # only. HF publishes arch-segregated tags; :120-1.9 is RTX 50X0 /
    # RTX PRO 6000 Blackwell. Added to TEI v1.9.0 (Feb 2026, PR #735).
    image: ghcr.io/huggingface/text-embeddings-inference:120-1.9
    container_name: orgchat-tei
    restart: unless-stopped
    logging: *rotated-logging
    mem_limit: 4g
    cpus: 2
    command:
      - "--model-id"
      - "${EMBED_MODEL}"
      - "--port"
      - "80"
      # Wave 1a (review §3.1): TEI default --max-input-length is 512, which
      # silently truncates RAPTOR L1+ summaries and per-doc summaries.
      # bge-m3 supports up to 8192.
      # NOTE: The Blackwell-specific image `:120-1.9` (Feb 2026 build)
      # does NOT recognize --max-input-length. Upgrade to TEI ≥ 1.10 when
      # the Blackwell-tagged build catches up; until then summaries truncate
      # at 512. Operator can verify by `docker run --gpus all ... --help |
      # grep max-input` against the live image tag.
    volumes:
      - ../volumes/models:/data
    environment:
      HF_HUB_OFFLINE: "1"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 60s
    # Pinned to GPU 1 (RTX PRO 4000 Blackwell 24 GB) — frees 1.6 GB on GPU 0
    # for vllm-chat KV cache. bge-m3 on Blackwell is ~1.6 GB VRAM.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]

  # Plan B Phase 4.1 — Query Understanding LLM. Pinned to GPU 1 (RTX PRO 4000
  # Blackwell, 24 GB) alongside TEI + open-webui reranker. GPU 0 is reserved
  # for vllm-chat (Gemma-4-31B-AWQ at ~89% VRAM).
  #
  # Sizing: Qwen3-4B-Instruct-2507-AWQ-4bit ≈ 3.5 GB weights + KV cache cap
  # 4-5 GB (--gpu-memory-utilization 0.45). Total resident with TEI +
  # reranker ≈ 12 GB / 24 GB ≈ 50%.
  #
  # The bridge (ext/services/chat_rag_bridge.py) soft-fails when this service
  # is unreachable — open-webui therefore does NOT depends_on vllm-qu.
  vllm-qu:
    image: vllm/vllm-openai:latest
    container_name: orgchat-vllm-qu
    restart: unless-stopped
    logging: *rotated-logging
    mem_limit: 12g
    cpus: 4
    ipc: host
    environment:
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-1}
      TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE:-1}
      VLLM_USE_V1: "1"
    volumes:
      - ../volumes/models:/root/.cache/huggingface/hub
    ports:
      # Wave 1a (review §11.2): bound to loopback. vllm-qu has no auth at
      # all — exposing 8101 to the LAN handed an open OpenAI-compatible
      # endpoint to anyone who could route to the host. open-webui talks
      # to it via the docker network (vllm-qu:8000) regardless.
      - "127.0.0.1:8101:8000"
    command:
      # Quantization is auto-detected from the model's config.json
      # (compressed-tensors AWQ-4bit). Passing --quantization explicitly
      # makes vLLM error out on a mismatch with the cpatonn build.
      - "--model"
      - "cpatonn/Qwen3-4B-Instruct-2507-AWQ-4bit"
      - "--served-model-name"
      - "qwen3-4b-qu"
      - "--dtype"
      - "auto"
      - "--max-model-len"
      - "8192"
      - "--gpu-memory-utilization"
      - "0.45"
      - "--enable-prefix-caching"
      - "--port"
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/v1/models | grep -q qwen3-4b-qu || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]

  # vllm-vision — REMOVED 2026-04-20 (Gemma 4 swap).
  # Gemma 4 31B AWQ served by vllm-chat is multimodal (text + image + video),
  # so we consolidate. The vision facade env var VISION_API_BASE_URL in .env
  # now points at vllm-chat:8000; model-manager's VISION_URL likewise.
  # Qwen2-VL-2B weights remain on disk (volumes/models) for easy rollback.

  whisper:
    build:
      context: ../whisper_service
    container_name: orgchat-whisper
    restart: unless-stopped
    logging: *rotated-logging
    mem_limit: 2g
    cpus: 2
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-base.en}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
      WHISPER_CACHE: /models
      PORT: "9000"
    volumes:
      - ../volumes/models:/models
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s
    # Stays on CPU (int8, base.en) for now — faster-whisper needs CUDA+cuDNN
    # libs which the current python:3.11-slim base lacks. To move to GPU 1:
    # rebuild whisper image on nvidia/cuda:12.1-cudnn8-runtime and flip
    # WHISPER_DEVICE=cuda, WHISPER_COMPUTE_TYPE=float16 in compose/.env.

  tts:
    build:
      context: ../tts_service
    container_name: kairos-tts
    restart: unless-stopped
    logging: *rotated-logging
    mem_limit: 1g
    cpus: 1
    environment:
      PIPER_DEFAULT_VOICE: ${AUDIO_TTS_VOICE:-en_US-lessac-medium}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9100/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  model-manager:
    build:
      context: ../model_manager
    container_name: orgchat-model-manager
    restart: unless-stopped
    logging: *rotated-logging
    mem_limit: 512m
    cpus: 1
    environment:
      # Vision consolidated into vllm-chat (Gemma 4 31B is multimodal).
      VISION_URL: http://vllm-chat:8000
      WHISPER_URL: http://whisper:9000
      MODEL_UNLOAD_IDLE_SECS: ${MODEL_UNLOAD_IDLE_SECS:-300}
      MODEL_MANAGER_POLL_SECS: "15"
    # No host port — accessed via Docker network only
    depends_on:
      - whisper
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/healthz || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

  open-webui:
    # Phase 3: cu128 variant built on torch 2.7+ with Blackwell (sm_120) kernels.
    # Rollback to cu121 build by reverting to Dockerfile.openwebui and
    # `docker tag orgchat-open-webui:pre-cu128 orgchat-open-webui:latest`.
    image: orgchat-open-webui:cu128-test
    build:
      context: ..
      dockerfile: Dockerfile.openwebui.cu128
    container_name: orgchat-open-webui
    restart: unless-stopped
    logging: *rotated-logging
    mem_limit: 8g
    cpus: 4
    # Wave 1b (review §11.10): align the runtime UID with the celery-worker
    # so the shared /var/ingest volume (producer here, consumer there) is
    # owned by the same numeric uid:gid on both sides. Matches the
    # `USER 1000:1000` baked into Dockerfile.openwebui.cu128 (review §10.1)
    # — duplicating it here is belt-and-braces: if the image somehow ships
    # without the USER directive, compose still drops root.
    #
    # First-time setup (one-shot, idempotent):
    #   docker compose -p orgchat run --rm --user root open-webui \
    #     chown -R 1000:1000 /var/ingest /app/backend/data/uploads \
    #                        /root/.cache/huggingface
    # After that, every restart preserves the host uid mapping.
    # See docs/runbook/cold-start.md for the cold-start checklist.
    #
    # NOTE: the `user: "1000:1000"` directive below is COMMENTED until the
    # cu128 openwebui image is rebuilt with the USER 1000 baked in (the
    # currently-deployed `:cu128-test` image was built before §10.1 added
    # the directive — its /app/backend layout is root-owned and the runtime
    # crashes with PermissionError at /app/backend/data/cache when forced
    # to 1000 from compose). After rebuild succeeds (gated on pypi.nvidia.com
    # egress recovering — see Dockerfile.openwebui.cu128 §10.2 commit), flip
    # this back on.
    # user: "1000:1000"
    ports:
      # Wave 1a (review §11.2): bound to loopback. End-users go through
      # Caddy on :8443 (HTTPS, with WEBUI_SECRET_KEY-signed JWT). Direct
      # access to :6100 bypasses the TLS layer; only operators on the
      # host (or SSH-tunneled) need it for debugging.
      - "127.0.0.1:6100:8080"
    environment:
      PORT: "8080"
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
      WEBUI_NAME: ${WEBUI_NAME}
      ENABLE_SIGNUP: ${ENABLE_SIGNUP:-false}
      DEFAULT_USER_ROLE: ${DEFAULT_USER_ROLE:-pending}
      DEFAULT_MODELS: ${DEFAULT_MODELS:-orgchat-chat}
      # Make every model visible to every logged-in user. With one shared
      # base model (orgchat-chat) this is the simplest "all users see it"
      # path; without this the per-model AccessGrants check filters out
      # models for non-admins who aren't members of any granted group.
      BYPASS_MODEL_ACCESS_CONTROL: ${BYPASS_MODEL_ACCESS_CONTROL:-true}
      ENABLE_COMMUNITY_SHARING: "false"
      ENABLE_MESSAGE_RATING: "false"
      SHOW_ADMIN_DETAILS: "false"
      ENABLE_OPENAI_API: ${ENABLE_OPENAI_API:-true}
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL:-http://vllm-chat:8000/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-internal-dummy}
      VISION_API_BASE_URL: ${VISION_API_BASE_URL:-http://vllm-vision:8000/v1}
      VISION_MODEL_SERVED_NAME: ${VISION_MODEL_SERVED_NAME:-orgchat-vision}
      ENABLE_OLLAMA_API: ${ENABLE_OLLAMA_API:-false}
      ENABLE_WEB_SEARCH: ${ENABLE_WEB_SEARCH:-false}
      ENABLE_IMAGE_GENERATION: ${ENABLE_IMAGE_GENERATION:-false}
      ENABLE_RAG_WEB_LOADER: ${ENABLE_RAG_WEB_LOADER:-false}
      AUDIO_STT_ENGINE: ${AUDIO_STT_ENGINE:-openai}
      AUDIO_STT_OPENAI_API_BASE_URL: ${AUDIO_STT_OPENAI_API_BASE_URL:-http://whisper:9000/v1}
      AUDIO_STT_OPENAI_API_KEY: ${AUDIO_STT_OPENAI_API_KEY:-sk-kairos-stt}
      AUDIO_STT_MODEL: ${AUDIO_STT_MODEL:-whisper-1}
      AUDIO_TTS_ENGINE: ${AUDIO_TTS_ENGINE:-openai}
      AUDIO_TTS_OPENAI_API_BASE_URL: ${AUDIO_TTS_OPENAI_API_BASE_URL:-http://tts:9100/v1}
      AUDIO_TTS_OPENAI_API_KEY: ${AUDIO_TTS_OPENAI_API_KEY:-sk-kairos-tts}
      AUDIO_TTS_MODEL: ${AUDIO_TTS_MODEL:-tts-1}
      AUDIO_TTS_VOICE: ${AUDIO_TTS_VOICE:-en_US-lessac-medium}
      RAG_EMBEDDING_ENGINE: ${RAG_EMBEDDING_ENGINE:-openai}
      RAG_EMBEDDING_OPENAI_API_BASE_URL: ${RAG_EMBEDDING_OPENAI_API_BASE_URL:-http://tei:80/v1}
      RAG_OPENAI_API_BASE_URL: ${RAG_OPENAI_API_BASE_URL:-http://tei:80/v1}
      RAG_OPENAI_API_KEY: ${RAG_OPENAI_API_KEY:-sk-kairos-embed}
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-BAAI/bge-m3}
      RAG_FULL_CONTEXT: ${RAG_FULL_CONTEXT:-false}
      RAG_TOP_K: ${RAG_TOP_K:-5}
      RAG_TOP_K_RERANKER: ${RAG_TOP_K_RERANKER:-5}
      # B1 — core retrieval flag passthrough. Without these, the chat
      # process inherits Python module defaults from ext/services/* which
      # have drifted from production reality (e.g. RAG_COLBERT default OFF
      # while kb_1_v4 has the colbert named slot — new ingests would skip
      # colbert vectors and the collection schema would split over time).
      # Defaults below match the live Plan A / Plan B configuration:
      #   RAG_HYBRID=1            BM25 + dense fusion (eval winner)
      #   RAG_COLBERT=1           late-interaction rerank (kb_1_v4 has slot)
      #   RAG_RERANK=1            BAAI/bge-reranker-v2-m3 on GPU 1
      #   RAG_MMR=0               intent-conditional via _INTENT_FLAG_POLICY
      #   RAG_CONTEXT_EXPAND=0    intent-conditional (same)
      RAG_HYBRID: ${RAG_HYBRID:-1}
      RAG_COLBERT: ${RAG_COLBERT:-1}
      RAG_RERANK: ${RAG_RERANK:-1}
      RAG_MMR: ${RAG_MMR:-0}
      RAG_MMR_LAMBDA: ${RAG_MMR_LAMBDA:-0.7}
      RAG_CONTEXT_EXPAND: ${RAG_CONTEXT_EXPAND:-0}
      RAG_CONTEXT_EXPAND_WINDOW: ${RAG_CONTEXT_EXPAND_WINDOW:-1}
      RAG_RERANK_TOP_K: ${RAG_RERANK_TOP_K:-12}
      # 2026-04-29 — Global drill-down for chronology / list-everything queries.
      # After the level=doc summary pass returns one paraphrase per document,
      # fan out to per-doc chunk retrieval (K chunks per doc) and merge so the
      # LLM sees both per-doc summaries AND granular event chunks. Wider
      # budget for global intent only; specific/metadata stay at 10K.
      RAG_GLOBAL_DRILLDOWN: ${RAG_GLOBAL_DRILLDOWN:-1}
      RAG_GLOBAL_DRILLDOWN_K: ${RAG_GLOBAL_DRILLDOWN_K:-2}
      RAG_GLOBAL_BUDGET_TOKENS: ${RAG_GLOBAL_BUDGET_TOKENS:-22000}
      # Bumped 10000 -> 22000 on 2026-05-01 (Phase 6.X). Multi-entity
      # decomposition + context_expand inflate per-hit tokens; prior
      # default evicted down to 3 hits on a 4-brigade query.
      RAG_BUDGET_TOKENS: ${RAG_BUDGET_TOKENS:-22000}
      # Cap MMR re-embed batch size. Pairs with multi-entity
      # decomposition: cross-encoder already ranked the pool, MMR
      # only diversifies the top band — sending all 200 candidates
      # to TEI OOMs GPU 1.
      RAG_MMR_MAX_INPUT_SIZE: ${RAG_MMR_MAX_INPUT_SIZE:-50}
      # Phase 6.X — Option B: when MMR fails (TEI OOM under multi-entity
      # decompose), trim cross-encoder output to _final_k before
      # context_expand. Default 0 preserves pre-fix behaviour.
      RAG_MMR_FAIL_TRIM: ${RAG_MMR_FAIL_TRIM:-0}
      # Phase 6.X — Option C: cap how many top hits get sibling-expanded.
      # Each expand_context call multiplies a hit by 1+2*window chunks,
      # so 50 hits × window=1 → 150 chunks ≈ 350K tokens. 0 = unlimited.
      # Default 4 (2026-05-01): focuses sibling richness on top-N
      # results, preserves the rest unchanged. Beat A and B in trials
      # because (a) QU LLM doesn't time out (fastembed stays on GPU),
      # (b) date-filter intent is preserved, (c) only top-4 inflate
      # before budget eviction.
      RAG_CONTEXT_EXPAND_MAX_HITS: ${RAG_CONTEXT_EXPAND_MAX_HITS:-4}
      # Phase 6.X — multi-entity decomposition (Methods 3 / 4 / 5).
      # All default OFF — opt in per KB via Advanced Settings, or
      # globally via these env vars. See .env.example for usage notes.
      RAG_MULTI_ENTITY_DECOMPOSE: ${RAG_MULTI_ENTITY_DECOMPOSE:-0}
      RAG_ENTITY_TEXT_FILTER: ${RAG_ENTITY_TEXT_FILTER:-0}
      RAG_QU_ENTITY_EXTRACT: ${RAG_QU_ENTITY_EXTRACT:-0}
      RAG_MULTI_ENTITY_MIN_PER_ENTITY: ${RAG_MULTI_ENTITY_MIN_PER_ENTITY:-10}
      # Plan B Phase 5.4 — per-document summary tier. When on, each KB
      # ingest emits one ``level=doc`` summary point (chat-model 3-line
      # synopsis, mirrored to kb_documents.doc_summary). Required for
      # the "global" intent path to return one chunk per doc on
      # "summarize all" queries — without this, broad queries fall back
      # to chunk-level retrieval and only the top-scoring docs surface.
      # Default ON now that custom-sharding stamps a shard_key on the
      # summary point. Timeout bumped to 90s — the chat model needs
      # ~30-60s for longer monthly reports.
      RAG_DOC_SUMMARIES: ${RAG_DOC_SUMMARIES:-1}
      RAG_DOC_SUMMARY_TIMEOUT: ${RAG_DOC_SUMMARY_TIMEOUT:-90}
      # Plan B Phase 4 — turn on the intent router so classified labels
      # (metadata / global / specific_date / specific) actually route the
      # retrieval pipeline. RAG_QU_SHADOW_MODE=1 alone only logs the
      # classification — the live ``_intent`` variable in chat_rag_bridge
      # stays at "specific" until this flag flips on. Without routing,
      # "summarize all" queries fall back to chunk-level retrieval with
      # per_kb_limit=10 and only 7-8 of N docs end up in the prompt.
      RAG_INTENT_ROUTING: ${RAG_INTENT_ROUTING:-1}
      CHUNK_SIZE: ${CHUNK_SIZE:-800}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-100}
      RAG_FILE_MAX_SIZE: ${RAG_FILE_MAX_SIZE:-26214400}
      RAG_FILE_MAX_COUNT: ${RAG_FILE_MAX_COUNT:-10}
      # Phase 2.1 — Spotlighting (indirect prompt-injection defense) is now
      # default-on. Wraps every retrieved chunk in <UNTRUSTED_RETRIEVED_CONTENT>
      # tags and instructs the model to treat the payload as data only.
      # See ext/services/spotlight.py and tests/unit/test_spotlight_default.py.
      # Override via RAG_SPOTLIGHT=0 in the deploy env to disable.
      RAG_SPOTLIGHT: ${RAG_SPOTLIGHT:-1}
      # Auto-inject current date/time as a pseudo-source on every retrieval so
      # the chat model can answer "what day is it?" without hallucinating from
      # its training cutoff. Toggle with RAG_INJECT_DATETIME=0 to disable.
      RAG_INJECT_DATETIME: ${RAG_INJECT_DATETIME:-1}
      RAG_TZ: ${RAG_TZ:-UTC}
      VECTOR_DB: ${VECTOR_DB:-qdrant}
      DATABASE_URL: ${DATABASE_URL}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_URI: ${QDRANT_URL:-http://qdrant:6333}
      # Wave 1a (review §4.1): empty-string passthrough so the value is
      # truthy-empty in Python (os.environ.get returns ""), which
      # VectorStore treats as None — preserving the no-auth default.
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      TEI_URL: ${TEI_URL:-http://tei:80}
      AUTH_MODE: ${AUTH_MODE:-jwt}
      RAG_VECTOR_SIZE: ${RAG_VECTOR_SIZE:-1024}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # Phase 1.5 — Redis-backed RBAC cache. DB 3 is reserved so the cache
      # is isolated from the application redis (DB 0) and the celery
      # broker. TTL=0 disables the cache (operator escape hatch); default
      # 30s balances admin-grant freshness against DB load reduction.
      RAG_RBAC_CACHE_REDIS_URL: ${RAG_RBAC_CACHE_REDIS_URL:-redis://redis:6379/3}
      RAG_RBAC_CACHE_TTL_SECS: ${RAG_RBAC_CACHE_TTL_SECS:-30}
      # Plan B Phase 4 — Query Understanding LLM. Hybrid regex+LLM router that
      # escalates ambiguous queries (pronouns, relative time, multi-clause,
      # comparison verbs) to the QU vLLM service on GPU 1. Soft-fails to
      # regex-only when vllm-qu is unreachable. Redis DB 4 reserved for the
      # QU result cache (DB 3 = RBAC, DB 0 = app, DB 1/2 = celery).
      RAG_QU_URL: ${RAG_QU_URL:-http://vllm-qu:8000/v1}
      RAG_QU_MODEL: ${RAG_QU_MODEL:-qwen3-4b-qu}
      RAG_QU_ENABLED: ${RAG_QU_ENABLED:-0}
      RAG_QU_LATENCY_BUDGET_MS: ${RAG_QU_LATENCY_BUDGET_MS:-1500}
      RAG_QU_CACHE_ENABLED: ${RAG_QU_CACHE_ENABLED:-1}
      RAG_QU_CACHE_TTL_SECS: ${RAG_QU_CACHE_TTL_SECS:-300}
      RAG_QU_REDIS_DB: ${RAG_QU_REDIS_DB:-4}
      RAG_QU_SHADOW_MODE: ${RAG_QU_SHADOW_MODE:-0}
      # Plan B Phase 6.2 — async ingest. Code default is "0" (async via
      # celery-worker on the ingest queue). Operator override path:
      # RAG_SYNC_INGEST=1 in compose/.env to revert to legacy in-process
      # sync ingest (worker still runs but receives no tasks).
      RAG_SYNC_INGEST: ${RAG_SYNC_INGEST:-0}
      # Plan B Phase 6.3 — OCR fallback. Default off; flip per-KB via the
      # ocr_policy JSONB column. Globally toggling here is the fast path
      # for backfill jobs that need OCR across every KB.
      RAG_OCR_ENABLED: ${RAG_OCR_ENABLED:-0}
      RAG_IMAGE_CAPTIONS: ${RAG_IMAGE_CAPTIONS:-0}
      # Vision endpoint for image captions. Code default is vllm-vision
      # (which doesn't exist in this deploy); explicit pass-through is
      # required to route to vllm-chat / Gemma-4 multimodal.
      RAG_VISION_URL: ${RAG_VISION_URL:-http://vllm-chat:8000/v1}
      RAG_VISION_MODEL: ${RAG_VISION_MODEL:-orgchat-chat}
      RAG_VISION_MAX_TOKENS: ${RAG_VISION_MAX_TOKENS:-800}
      RAG_STRUCTURED_CHUNKER: ${RAG_STRUCTURED_CHUNKER:-0}
      # Plan B Phase 5 — kb_1 alias points to custom-sharded kb_1_v4.
      # Ingest must derive a shard_key per document (filename-first, body
      # fallback) so vector_store.upsert can pass shard_key_selector.
      RAG_SHARDING_ENABLED: ${RAG_SHARDING_ENABLED:-0}
      # Phase 1.3 fix — temporal level injection + shard_key filter at
      # retrieval time. Without this, a query with a parsed
      # (year, month) constraint scans the whole collection instead of
      # the matching shard, and L1/L2/L3 RAPTOR summary points are never
      # injected into the candidate pool. Pairs with RAG_SHARDING_ENABLED.
      RAG_TEMPORAL_LEVELS: ${RAG_TEMPORAL_LEVELS:-1}
      # Phase 1.2 fix — minimum QU LLM confidence required to override the
      # regex intent label for routing. 0.80 matches the Phase 4 disagree-
      # threshold used in shadow-mode promotion.
      RAG_QU_INTENT_MIN_CONF: ${RAG_QU_INTENT_MIN_CONF:-0.80}
      # Phase A — offline-mode env. Models are baked into the image
      # (fastembed at /opt/fastembed_cache, tiktoken at /opt/tiktoken-cache)
      # plus runtime bind-mount of volumes/hf-cache for bge-reranker-v2-m3.
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-1}
      TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE:-1}
      HF_DATASETS_OFFLINE: ${HF_DATASETS_OFFLINE:-1}
      HF_TOKEN: ${HF_TOKEN:-}
      FASTEMBED_CACHE_PATH: /opt/fastembed_cache
      # Phase A — GPU providers for fastembed (colbert + sparse). Falls
      # back to CPU automatically on container missing GPU access.
      RAG_FASTEMBED_PROVIDERS: ${RAG_FASTEMBED_PROVIDERS:-CUDAExecutionProvider,CPUExecutionProvider}
      # Plan B post-merge soak fix: tell budget.py to use the gemma tokenizer
      # so token counts match the actual chat model (vllm-chat serves
      # QuantTrio/gemma-4-31B-it-AWQ). cl100k undercounts gemma by ~10-15%.
      RAG_BUDGET_TOKENIZER: ${RAG_BUDGET_TOKENIZER:-gemma-4}
      RAG_BUDGET_TOKENIZER_MODEL: ${RAG_BUDGET_TOKENIZER_MODEL:-QuantTrio/gemma-4-31B-it-AWQ}
      SESSION_SECRET: ${SESSION_SECRET}
    # Wave 1b (review §11.5): mount the JWT signing key + admin token + qdrant
    # api key as files under /run/secrets/. open-webui's WEBUI_SECRET_KEY does
    # NOT have a `_FILE` convention upstream so it still consumes the env var
    # above; the mounted secret is available for an entrypoint wrapper if/when
    # the operator wants to source from disk (e.g. for in-place rotation
    # without restarting the container). Same for RAG_ADMIN_TOKEN /
    # QDRANT_API_KEY — both consumed by ext/services/* via os.environ.
    secrets:
      - webui_secret_key
      - rag_admin_token
      - qdrant_api_key
    volumes:
      - ../volumes/uploads:/app/backend/data/uploads
      # 2026-05-03: post-§10.1 image runs as USER 1000:1000 with HOME=/home/orgchat;
      # /root/ is mode 700 root-owned so the user can't traverse it. Mount HF
      # cache at the user's HOME instead — transformers/huggingface_hub default
      # to $HOME/.cache/huggingface so no env override is needed.
      - ../volumes/hf-cache:/home/orgchat/.cache/huggingface
      # Bind the gemma model dir from volumes/models into the HF cache
      # subpath so AutoTokenizer.from_pretrained finds it offline. Mounted
      # read-only — open-webui must never mutate the model store.
      - ../volumes/models/models--QuantTrio--gemma-4-31B-it-AWQ:/home/orgchat/.cache/huggingface/hub/models--QuantTrio--gemma-4-31B-it-AWQ:ro
      - ingest_blobs:/var/ingest
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      tts:
        condition: service_healthy
      whisper:
        condition: service_healthy
      # Wave 2 (review §11.12): tei + vllm-chat warm slowly (60s+ for TEI
      # model load, ~2 min for vllm-chat). Without these gates, the first
      # retrieval after `docker compose up` 503s with "embedder not ready"
      # for the warm-up window. Now open-webui won't start until both are
      # responding to their /health probes.
      tei:
        condition: service_healthy
      vllm-chat:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    # Phase 3: moved to GPU 1 (Blackwell 24 GB) alongside TEI. Frees ~7 GB on
    # GPU 0 for vllm-chat KV cache (util bumped 0.75 → 0.90 in Phase 3.10).
    # Requires cu128 image (torch 2.7+) — see image: orgchat-open-webui:cu128-test
    # above. Rollback to GPU 0: set device_ids: ["0"] + revert image to pre-cu128.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]

  # Celery worker for asynchronous ingest. Default-up after Plan B Phase 6.2
  # — RAG_SYNC_INGEST defaults to 0 so all uploads route through this worker
  # via the shared ingest_blobs volume. Set RAG_SYNC_INGEST=1 on open-webui to
  # revert to legacy in-process ingest (worker still runs, just no tasks).
  # See ext/workers/ingest_worker.py.
  celery-worker:
    build:
      context: ..
      dockerfile: compose/Dockerfile.celery
    container_name: orgchat-celery-worker
    restart: unless-stopped
    logging: *rotated-logging
    mem_limit: 8g
    cpus: 4
    # Wave 1b (review §11.10): consumer side of the /var/ingest pipe.
    # Must match the open-webui producer's UID so the worker can read
    # blobs written by the chat container. See open-webui service block
    # above for the one-shot chown command and docs/runbook/cold-start.md.
    user: "1000:1000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      INGEST_BLOB_ROOT: /var/ingest
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      # Wave 1a (review §4.1): celery-worker also instantiates VectorStore
      # for ingest upserts; same QDRANT_API_KEY plumbing as open-webui.
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      TEI_URL: ${TEI_URL:-http://tei:80}
      RAG_VECTOR_SIZE: ${RAG_VECTOR_SIZE:-1024}
      RAG_EMBEDDING_OPENAI_API_BASE_URL: ${RAG_EMBEDDING_OPENAI_API_BASE_URL:-http://tei:80/v1}
      # Plan B Phase 5 — async ingest target may be custom-sharded.
      RAG_SHARDING_ENABLED: ${RAG_SHARDING_ENABLED:-0}
      # B1 — retrieval flags must reach the celery ingest worker so new
      # uploads write the same vector slots that retrieval expects. Without
      # RAG_COLBERT=1 here the worker skips colbert vectors even though
      # kb_1_v4 has the named slot, producing mixed-schema points.
      # RAG_RERANK is included for parity (worker doesn't rerank, but
      # other ingest helpers may peek at it).
      RAG_HYBRID: ${RAG_HYBRID:-1}
      RAG_COLBERT: ${RAG_COLBERT:-1}
      RAG_RERANK: ${RAG_RERANK:-1}
      # The worker also runs ingest_bytes() and writes the doc-summary
      # tier; both sides need the same flag + chat-model URL/key/timeout.
      RAG_DOC_SUMMARIES: ${RAG_DOC_SUMMARIES:-1}
      RAG_DOC_SUMMARY_TIMEOUT: ${RAG_DOC_SUMMARY_TIMEOUT:-90}
      # Phase 6.6 — structured chunker. Async ingest in celery-worker
      # also calls chunk_text_for_kb, which double-gates on this env
      # flag plus per-KB rag_config.chunking_strategy="structured".
      # Without this mapping, async-ingested KBs would silently fall
      # back to window even when opted in.
      RAG_STRUCTURED_CHUNKER: ${RAG_STRUCTURED_CHUNKER:-0}
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL:-http://vllm-chat:8000/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-internal-dummy}
      SUMMARY_MODEL: ${SUMMARY_MODEL:-orgchat-chat}
      # Vision-caption pipeline (Plan B Phase 6.7 + page-render fallback).
      # The async ingest worker also runs extract_images_as_chunks; it
      # needs the same vision endpoint + caption-token cap as open-webui.
      RAG_IMAGE_CAPTIONS: ${RAG_IMAGE_CAPTIONS:-0}
      RAG_VISION_URL: ${RAG_VISION_URL:-http://vllm-chat:8000/v1}
      RAG_VISION_MODEL: ${RAG_VISION_MODEL:-orgchat-chat}
      RAG_VISION_MAX_TOKENS: ${RAG_VISION_MAX_TOKENS:-800}
      # Phase A — offline-mode env. Models are baked into the image (see
      # Dockerfile.celery: fastembed cache at /opt/fastembed_cache,
      # tiktoken cache at /opt/tiktoken-cache). HF_TOKEN is the operator's
      # HF Hub token from `hf auth login` on the host — passed for completeness
      # so any future model load that legitimately needs auth doesn't 401.
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-1}
      TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE:-1}
      HF_DATASETS_OFFLINE: ${HF_DATASETS_OFFLINE:-1}
      HF_TOKEN: ${HF_TOKEN:-}
      FASTEMBED_CACHE_PATH: /opt/fastembed_cache
      # Phase A — fastembed providers. With fastembed-gpu installed and the
      # GPU 1 device reservation below, ColBERT + sparse BM25 run on GPU.
      # Override to "CPUExecutionProvider" if a GPU is unavailable; the
      # default falls through to CPU on its own (see _fastembed_providers).
      RAG_FASTEMBED_PROVIDERS: ${RAG_FASTEMBED_PROVIDERS:-CUDAExecutionProvider,CPUExecutionProvider}
      # Wave 3a (review §4.2) — Qdrant snapshot beat task cron.
      # Default = daily at 02:30 UTC; offset from blob_gc's 03:17. Empty
      # / unset → use the in-code default. CLAUDE.md §7 trap: env vars
      # must be explicitly mapped here OR they never reach the worker.
      RAG_QDRANT_SNAPSHOT_CRON: ${RAG_QDRANT_SNAPSHOT_CRON:-}
    # Wave 1b (review §11.5): the celery-worker also talks to qdrant +
    # postgres so it gets the same secrets mounted as open-webui. Same
    # caveat about no-`_FILE` upstream consumption — env vars above
    # still drive the actual config; the secret files are available
    # for entrypoint wrappers / rotation.
    secrets:
      - postgres_password
      - qdrant_api_key
      - rag_admin_token
    volumes:
      - ingest_blobs:/var/ingest
      # Wave 3a (review §4.2) — backups output dir, shared with host.
      # The Celery snapshot task writes summaries here; operators see
      # the same files at ./backups/ on the host.
      - backups:/host-backups:rw
    # Phase A — GPU reservation. Shares GPU 1 with the reranker
    # (open-webui) and the QU LLM (vllm-qu). All three use a small slice
    # of VRAM (colbert ~1.5 GB, sparse <500 MB, reranker ~3 GB,
    # vllm-qu ~10 GB), well under the GPU's free 24 GB headroom.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]
    command:
      - celery
      - -A
      - ext.workers.celery_app
      - worker
      - --loglevel=info
      - --queues=ingest
      - --concurrency=2
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  # Plan B Phase 5.8 — Celery Beat scheduler. Fires the daily tier-storage
  # cron at 03:00 local for each collection in RAG_TIER_COLLECTIONS. Single
  # instance only — running multiple Beats causes duplicate task firings.
  # The wall-clock-time schedule lives in
  # ext/workers/scheduled_eval.py:beat_schedule.
  celery-beat:
    build:
      context: ..
      dockerfile: compose/Dockerfile.celery
    container_name: orgchat-celery-beat
    restart: unless-stopped
    logging: *rotated-logging
    mem_limit: 512m
    cpus: 1
    # Wave 1b (review §11.10): same image as celery-worker, same drop-root.
    # Beat owns the celery_beat_state volume — that schedule file must be
    # writable by uid 1000.
    user: "1000:1000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      RAG_TIER_COLLECTIONS: ${RAG_TIER_COLLECTIONS:-kb_1_v4}
      # Wave 3a (review §4.2) — beat reads the cron when registering the
      # schedule entry. Without this passthrough, beat uses the in-code
      # default regardless of operator override in compose/.env.
      RAG_QDRANT_SNAPSHOT_CRON: ${RAG_QDRANT_SNAPSHOT_CRON:-}
    volumes:
      - celery_beat_state:/var/celery
    command:
      - celery
      - -A
      - ext.workers.celery_app
      - beat
      - --loglevel=info
      - --schedule=/var/celery/celerybeat-schedule
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
