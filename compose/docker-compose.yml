version: "3.8"

name: orgchat

networks:
  default:
    name: orgchat-net
    driver: bridge
    internal: false  # temporarily false; switched to true after Caddy is wired (Task 7)

volumes:
  postgres_data: { driver: local }
  redis_data:    { driver: local }
  qdrant_data:   { driver: local }

services:
  postgres:
    image: postgres:15-alpine
    container_name: orgchat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../ext/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: orgchat-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: orgchat-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:6333/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    container_name: orgchat-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ../volumes/certs:/certs:ro
    depends_on:
      - postgres   # real dependency added when open-webui lands

  vllm-chat:
    image: vllm/vllm-openai:latest
    container_name: orgchat-vllm-chat
    restart: unless-stopped
    ipc: host
    ports:
      - "8000:8000"
    volumes:
      - ../volumes/models:/root/.cache/huggingface
    environment:
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    command:
      - "--model"
      - "${CHAT_MODEL}"
      - "--served-model-name"
      - "orgchat-chat"
      - "--max-model-len"
      - "8192"
      - "--gpu-memory-utilization"
      - "0.40"
      - "--enable-prefix-caching"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/v1/models || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 15
      start_period: 180s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:1.5
    container_name: orgchat-tei
    restart: unless-stopped
    command:
      - "--model-id"
      - "${EMBED_MODEL}"
      - "--port"
      - "80"
    volumes:
      - ../volumes/models:/data
    environment:
      HF_HUB_OFFLINE: "1"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  vllm-vision:
    image: vllm/vllm-openai:latest
    container_name: orgchat-vllm-vision
    restart: unless-stopped
    ipc: host
    volumes:
      - ../volumes/models:/root/.cache/huggingface
    environment:
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    command:
      - "--model"
      - "${VISION_MODEL}"
      - "--served-model-name"
      - "orgchat-vision"
      - "--max-model-len"
      - "4096"
      - "--gpu-memory-utilization"
      - "0.25"
      - "--enable-sleep-mode"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/v1/models || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 15
      start_period: 240s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  whisper:
    build:
      context: ../whisper_service
    container_name: orgchat-whisper
    restart: unless-stopped
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL}
      WHISPER_CACHE: /models
      PORT: "9000"
    volumes:
      - ../volumes/models:/models
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  model-manager:
    build:
      context: ../model_manager
    container_name: orgchat-model-manager
    restart: unless-stopped
    environment:
      VISION_URL: http://vllm-vision:8000
      WHISPER_URL: http://whisper:9000
      MODEL_UNLOAD_IDLE_SECS: ${MODEL_UNLOAD_IDLE_SECS:-300}
      MODEL_MANAGER_POLL_SECS: "15"
    ports:
      - "8080:8080"
    depends_on:
      - vllm-vision
      - whisper
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/healthz || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
